@LayoutPage _Layout.html
<div class="space-y-8">
    <div class="flex justify-between items-end">
        <div>
            <h2 class="text-3xl font-bold">Clientes</h2>
            <p class="text-slate-400">Listagem experimental via Web Stencils + Flyweight Iterator</p>
        </div>

        <div class="w-96 relative">
            <label class="text-sm text-slate-500 mb-2 block">Pesquisa em Tempo Real (HTMX)</label>
            <div class="relative group">
                <input type="text" id="search-input" name="SearchTerm" placeholder="Pesquisar..."
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 pr-10 focus:ring-2 focus:ring-cyan-500 outline-none transition-all"
                    hx-get="/customers/search" hx-trigger="keyup changed delay:300ms" hx-target="#results-tbody"
                    hx-indicator="#search-indicator"
                    oninput="this.nextElementSibling.classList.toggle('hidden', !this.value)">

                <button type="button"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white hidden transition-colors"
                    onclick="let inp = document.getElementById('search-input'); inp.value = ''; inp.dispatchEvent(new Event('input')); htmx.trigger('#search-input', 'keyup'); this.classList.add('hidden')">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-700/50 text-slate-300">
                <tr>
                    <th class="px-6 py-4">ID</th>
                    <th class="px-6 py-4">Nome</th>
                    <th class="px-6 py-4">Email</th>
                    <th class="px-6 py-4">Ações</th>
                </tr>
            </thead>
            <tbody id="results-tbody">
                @Import customers_list
            </tbody>
        </table>

        <div id="search-indicator" class="htmx-indicator p-4 text-center text-cyan-400">
            <span class="animate-pulse">Pesquisando no Banco de Dados...</span>
        </div>
    </div>
</div>
